name: Programming Jobs Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen_jobs.json from data branch
        run: |
          git fetch origin data || true
          git checkout origin/data -- seen_jobs.json 2>/dev/null || echo '[]' > seen_jobs.json
          echo "Seen jobs file size: $(wc -c < seen_jobs.json) bytes"

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          # Topic Thread IDs (from topic links: t.me/group/N → N)
          TOPIC_GENERAL: ${{ secrets.TOPIC_GENERAL }}
          TOPIC_BACKEND: ${{ secrets.TOPIC_BACKEND }}
          TOPIC_FRONTEND: ${{ secrets.TOPIC_FRONTEND }}
          TOPIC_FULLSTACK: ${{ secrets.TOPIC_FULLSTACK }}
          TOPIC_MOBILE: ${{ secrets.TOPIC_MOBILE }}
          TOPIC_DEVOPS: ${{ secrets.TOPIC_DEVOPS }}
          TOPIC_QA: ${{ secrets.TOPIC_QA }}
          TOPIC_AI_ML: ${{ secrets.TOPIC_AI_ML }}
          TOPIC_CYBERSECURITY: ${{ secrets.TOPIC_CYBERSECURITY }}
          TOPIC_GAMEDEV: ${{ secrets.TOPIC_GAMEDEV }}
          TOPIC_BLOCKCHAIN: ${{ secrets.TOPIC_BLOCKCHAIN }}
          TOPIC_EGYPT: ${{ secrets.TOPIC_EGYPT }}
          TOPIC_SAUDI: ${{ secrets.TOPIC_SAUDI }}
          TOPIC_INTERNSHIPS: ${{ secrets.TOPIC_INTERNSHIPS }}
          TOPIC_ERP: ${{ secrets.TOPIC_ERP }}
          # API Keys
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          FINDWORK_API_KEY: ${{ secrets.FINDWORK_API_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          MUSE_API_KEY: ${{ secrets.MUSE_API_KEY }}
        run: python main.py

      - name: Save seen_jobs.json to data branch
        run: |
          # Copy to /tmp/ before switching branches
          cp seen_jobs.json /tmp/seen_jobs.json

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to data branch (create if not exists)
          git fetch origin data 2>/dev/null || true
          git checkout data 2>/dev/null || git checkout --orphan data

          # Restore the file from /tmp/
          cp /tmp/seen_jobs.json seen_jobs.json

          # Commit and push
          git add seen_jobs.json
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "Update seen_jobs.json [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push origin data
          }
